name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      # deploy-pages fails transiently on GitHub's side fairly often (build/
      # upload always succeed; only this step errors) — retry a couple of
      # times with backoff before giving up, instead of needing a manual
      # empty-commit retry every time.
      - id: deployment
        uses: Wandalen/wretry.action@v3
        with:
          action: actions/deploy-pages@v4
          attempt_limit: 3
          attempt_delay: 20000
